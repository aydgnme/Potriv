spring:
  application:
    name: potriv-backend

  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/potriv
    username: potriv
    password: potriv

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /api

app:
  frontend-url: http://localhost:5173
  api-url: http://localhost:8080/api
  jwt:
    issuer: http://localhost:8080/api
    secret: change-this-secret-in-production-change-this-secret
    access-token-minutes: 15
    refresh-token-days: 7

cors:
  allowed-origins:
    - http://localhost:5173

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
