spring:
  application:
    name: potriv-backend

  profiles:
    active: dev

server:
  port: 8080
  servlet:
    context-path: /api

app:
  frontend-url: http://localhost:5173
  api-url: http://localhost:8080/api
  jwt:
    issuer: http://localhost:8080/api
    secret: change-this-secret-in-production-change-this-secret
    access-token-minutes: 15
    refresh-token-days: 7
  auth:
    password-reset-token-minutes: 30
    max-failed-login-attempts: 5
    lock-duration-minutes: 15
  mail:
    from: no-reply@potriv.local

potriv:
  system-admin:
    email: ${SYSTEM_ADMIN_EMAIL:admin@aydgn.me}
    password: ${SYSTEM_ADMIN_PASSWORD:ChangeMe123!}
    name: ${SYSTEM_ADMIN_NAME:Potriv System Admin}

cors:
  # Local frontend dev servers (Vite and the Next.js control console).
  # Production overrides this with env-driven explicit origins.
  allowed-origins: http://localhost:5173,http://localhost:3000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
