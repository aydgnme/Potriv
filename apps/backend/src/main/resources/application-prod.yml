spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  frontend-url: https://potriv.aydgn.me
  api-url: https://api.potriv.aydgn.me/api
  jwt:
    issuer: https://api.potriv.aydgn.me/api
    secret: ${JWT_SECRET}
    access-token-minutes: 15
    refresh-token-days: 7
  mail:
    from: ${MAIL_FROM}

cors:
  allowed-origins:
    - https://potriv.aydgn.me
