spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Schema is managed by Flyway only; Hibernate must never mutate it.
      # ProductionConfigGuard refuses create/create-drop/update at boot.
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  frontend-url: ${FRONTEND_URL:https://potriv.aydgn.me}
  api-url: ${APP_BASE_URL:https://api.potriv.aydgn.me/api}
  jwt:
    issuer: ${JWT_ISSUER:https://api.potriv.aydgn.me/api}
    # No default on purpose: production must fail fast without a real secret.
    secret: ${JWT_SECRET}
    access-token-minutes: ${ACCESS_TOKEN_TTL_MINUTES:15}
    refresh-token-days: ${REFRESH_TOKEN_TTL_DAYS:7}
  mail:
    from: ${MAIL_FROM}

cors:
  # Comma-separated list of exact origins. Wildcards are refused at boot
  # because CORS responses carry credentials.
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://potriv.aydgn.me}

# OpenAPI/Swagger stays off in production unless explicitly re-enabled.
springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        # Production exposes the health probe only.
        include: health
