<!DOCTYPE html>
<html th:replace="~{admin/layout/base :: page(~{::content})}" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div class="admin-page-head"><h1 th:text="${user.name}">User</h1></div>

    <section class="admin-card">
        <h2 class="admin-card-title">General</h2>
        <dl class="admin-dl">
            <dt>Name</dt><dd th:text="${user.name}">Name</dd>
            <dt>Email</dt><dd th:text="${user.email}">email</dd>
            <dt>Status</dt>
            <dd><span th:replace="~{admin/fragments/badges :: badge(${user.status})}"></span></dd>
        </dl>
    </section>

    <section class="admin-card">
        <h2 class="admin-card-title">Organization context</h2>
        <dl class="admin-dl">
            <dt>Organization</dt>
            <dd>
                <a th:if="${user.organizationId}"
                   th:href="@{'/admin/organizations/' + ${user.organizationId}}"
                   th:text="${user.organizationName}">Org</a>
                <span th:unless="${user.organizationId}" class="muted">Platform user (no organization)</span>
            </dd>
        </dl>
    </section>

    <section class="admin-card">
        <h2 class="admin-card-title">Roles</h2>
        <p>
            <span class="tag" th:each="role : ${user.roles}" th:text="${role}">ROLE</span>
            <span th:if="${user.roles.isEmpty()}" class="muted">No roles</span>
        </p>
    </section>

    <section class="admin-card">
        <h2 class="admin-card-title">Metadata</h2>
        <dl class="admin-dl">
            <dt>ID</dt><dd><code th:text="${user.id}">uuid</code></dd>
            <dt>Created</dt><dd th:text="${@adminFormat.dateTime(user.createdAt)}">date</dd>
            <dt>Updated</dt><dd th:text="${@adminFormat.dateTime(user.updatedAt)}">date</dd>
        </dl>
    </section>
</div>
</body>
</html>
