<!DOCTYPE html>
<html th:replace="~{admin/layout/base :: page(~{::content})}" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div class="admin-page-head"><h1>Invitations</h1></div>
    <div th:replace="~{admin/fragments/filters :: search('/admin/invitations', ${list.query}, 'Search organization…')}"></div>

    <div th:if="${list.items.isEmpty()}"
         th:replace="~{admin/fragments/empty-state :: empty('No invitations found.')}"></div>

    <table th:unless="${list.items.isEmpty()}" class="admin-table">
        <thead>
        <tr><th>Organization</th><th>Token</th><th>Status</th><th>Created</th><th>Expires</th></tr>
        </thead>
        <tbody>
        <tr th:each="invite : ${list.items}">
            <td><a th:href="@{'/admin/invitations/' + ${invite.id}}"
                   th:text="${invite.organizationName}">Org</a></td>
            <td><code th:text="${invite.tokenHint}">hidden</code></td>
            <td><span th:replace="~{admin/fragments/badges :: badge(${invite.status})}"></span></td>
            <td th:text="${@adminFormat.dateTime(invite.createdAt)}">date</td>
            <td th:text="${invite.expiresAt != null
                          ? @adminFormat.dateTime(invite.expiresAt) : '—'}">—</td>
        </tr>
        </tbody>
    </table>

    <div th:replace="~{admin/fragments/pagination :: pagination(${list})}"></div>
</div>
</body>
</html>
