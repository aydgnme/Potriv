services:
  postgres:
    image: postgres:16
    container_name: potriv-postgres
    environment:
      POSTGRES_DB: potriv
      POSTGRES_USER: potriv
      POSTGRES_PASSWORD: potriv
    ports:
      - "5432:5432"
    volumes:
      - potriv_postgres_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit
    container_name: potriv-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  potriv_postgres_data: